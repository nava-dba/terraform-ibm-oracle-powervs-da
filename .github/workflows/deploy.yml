##############################################################################
# CD Pipeline - IBM Cloud Projects Deployment
# Repo: nava-dba/terraform-ibm-oracle-powervs-da
#
# Triggers:
#   - Manual only (workflow_dispatch)
#
# Inputs:
#   - variation:       si | rac | si-rtg | rac-rtg
#   - install_type:    ASM | JFS2        (SI standard only)
#   - deployment_type: public | private  (RTG supports public only)
#   - action:          validate-only | validate-and-deploy | destroy
#
# Required secrets (one-time, never change):
#   IC_API_KEY                               IBM Cloud API key (CLI login)
#
#   --- SI / RAC standard (uses existing PowerVS workspace + bastion) ---
#   TF_VAR_IBMCLOUD_API_KEY                  IBM Cloud API key (public deployments)
#   TF_VAR_IBMCLOUD_API_KEY_PRIVATE          IBM Cloud API key (private deployments)
#   TF_VAR_SSH_PRIVATE_KEY                   Private key matching pi_ssh_public_key_name in PowerVS (public)
#   TF_VAR_SSH_PRIVATE_KEY_PRIVATE           Private key matching pi_ssh_public_key_name in PowerVS (private)
#
#   --- SI-RTG / RAC-RTG (each gets its OWN keypair — simultaneous deployments in same region) ---
#   TF_VAR_SSH_PUBLIC_KEY_JFS2_RTG           VPC SSH public key for SI-RTG JFS2  (unique fingerprint)
#   TF_VAR_SSH_PRIVATE_KEY_JFS2_RTG          Matching private key for SI-RTG JFS2
#   TF_VAR_SSH_PUBLIC_KEY_ASM_RTG            VPC SSH public key for SI-RTG ASM   (unique fingerprint)
#   TF_VAR_SSH_PRIVATE_KEY_ASM_RTG           Matching private key for SI-RTG ASM
#   TF_VAR_SSH_PUBLIC_KEY_RAC_RTG            VPC SSH public key for RAC-RTG       (unique fingerprint)
#   TF_VAR_SSH_PRIVATE_KEY_RAC_RTG           Matching private key for RAC-RTG
#
#   --- Shared across all variations ---
#   TF_VAR_ORA_DB_PASSWORD                   Oracle SYS/SYSTEM password
#   TF_VAR_ROOT_PASSWORD                     AIX root password (RAC and RAC-RTG only)
#   TF_VAR_IBMCLOUD_COS_SERVICE_CREDENTIALS  COS JSON service credentials
#
# Config IDs read from deploy/config.json (auto-updated by release pipeline)
# Required GitHub Environment: production (approval gate for deploy + destroy)
##############################################################################
name: CD-Pipeline

on:
  workflow_dispatch:
    inputs:
      variation:
        description: "Deployment flavor"
        required: true
        type: choice
        options:
          - si
          - rac
          - si-rtg
          - rac-rtg

      install_type:
        description: "Oracle install type (SI only)"
        required: false
        type: choice
        options:
          - ASM
          - JFS2

      prefix:
        description: "Resource prefix (optional). Leave blank to use the default from inputs.json."
        required: false
        type: string

      deployment_type:
        description: "Deployment type (RTG supports public only)"
        required: true
        type: choice
        options:
          - public
          - private

      action:
        description: "Action to perform"
        required: true
        type: choice
        options:
          - validate-only
          - validate-and-deploy
          - destroy

env:
  IBM_API_URL: "https://projects.api.cloud.ibm.com/v1"

jobs:

  ##############################################################################
  # JOB 1 - Validate
  ##############################################################################
  validate:
    name: Validate (${{ github.event.inputs.variation }}-${{ github.event.inputs.deployment_type }})
    runs-on: ubuntu-latest
    if: github.event.inputs.action != 'destroy'

    outputs:
      config_id:  ${{ steps.set-ids.outputs.config_id }}
      project_id: ${{ steps.set-ids.outputs.project_id }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login and Get IAM Token
        run: |
          curl -fsSL https://clis.cloud.ibm.com/install/linux | sh -s -- -q
          ibmcloud login --apikey "${{ secrets.IC_API_KEY }}" --no-region -q
          ibmcloud target -r us-south -q
          TOKEN=$(ibmcloud iam oauth-tokens | grep "IAM token" | awk '{print $4}')
          echo "IAM_TOKEN=${TOKEN}" >> $GITHUB_ENV
          echo "IAM token obtained"

      # -----------------------------------------------------------------------
      # Read config_id + project_id from deploy/config.json
      # SI:  config["si"]["public"]["asm"]  -> config_id + project_id
      # RAC: config["rac"]["public"]        -> config_id + project_id
      # -----------------------------------------------------------------------
      - name: Set Config ID
        id: set-ids
        run: |
          VARIATION="${{ github.event.inputs.variation }}"
          DTYPE="${{ github.event.inputs.deployment_type }}"
          INSTALL_TYPE=$(echo "${{ github.event.inputs.install_type }}" | tr '[:upper:]' '[:lower:]')

          python3 - <<PYEOF
          import json, os, sys

          with open("deploy/config.json") as f:
              config = json.load(f)

          variation    = "${VARIATION}"
          dtype        = "${DTYPE}"
          install_type = "${INSTALL_TYPE}"

          if variation == "si":
              section  = config.get(variation, {}).get(dtype, {}).get(install_type, {})
              key_path = f"{variation}/{dtype}/{install_type}"
          elif variation in ("si-rtg", "rac-rtg"):
              # RTG variations: no install_type sub-key, public only
              section  = config.get(variation, {}).get(dtype, {})
              key_path = f"{variation}/{dtype}"
          else:
              section  = config.get(variation, {}).get(dtype, {})
              key_path = f"{variation}/{dtype}"

          config_id  = section.get("config_id", "")
          project_id = section.get("project_id", "")

          if not config_id or not project_id:
              print(f"No config found for {key_path} in deploy/config.json")
              sys.exit(1)

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"config_id={config_id}\n")
              f.write(f"project_id={project_id}\n")

          print(f"OK: {key_path} -> config_id: {config_id}")
          PYEOF

      # -----------------------------------------------------------------------
      # Load deploy/{variation}/inputs.json - one file per variation
      # Inject deployment_type, oracle_install_type (si only), and secrets
      # -----------------------------------------------------------------------
      - name: Build Full Inputs
        run: |
          VARIATION="${{ github.event.inputs.variation }}"
          DEPLOYMENT_TYPE="${{ github.event.inputs.deployment_type }}"
          INSTALL_TYPE="${{ github.event.inputs.install_type }}"
          PREFIX="${{ github.event.inputs.prefix }}"

          python3 - <<PYEOF
          import json, os, sys

          variation    = "${VARIATION}"
          dtype        = "${DEPLOYMENT_TYPE}"
          install_type = "${INSTALL_TYPE}"
          prefix       = "${PREFIX}"
          inputs_file = f"deploy/{variation}/{dtype}/inputs.json"

          try:
              with open(inputs_file) as f:
                  inputs = json.load(f)
          except FileNotFoundError:
              print(f"inputs file not found: {inputs_file}")
              sys.exit(1)

          # Inject dynamic workflow inputs
          if variation not in ("si-rtg", "rac-rtg"):
              inputs["deployment_type"] = dtype
          if variation == "si":
              inputs["oracle_install_type"] = install_type
              if prefix:
                  inputs["prefix"] = prefix
          elif variation == "si-rtg":
              inputs["oracle_install_type"] = install_type
              # Always inject a collision-free default prefix per install_type;
              # user-supplied prefix overrides if provided.
              rtg_default_prefix = "rtjfs" if install_type.upper() == "JFS2" else "rtasm"
              inputs["prefix"] = prefix if prefix else rtg_default_prefix
          elif variation == "rac-rtg":
              # Always inject a collision-free default prefix;
              # user-supplied prefix overrides if provided.
              inputs["prefix"] = prefix if prefix else "rtrac"

          # Inject secrets
          # Each RTG variation gets its own dedicated keypair so that all three can be
          # deployed simultaneously in the same region without VPC SSH key fingerprint conflicts:
          #   si-rtg  + install_type=JFS2 -> JFS2_RTG keypair
          #   si-rtg  + install_type=ASM  -> ASM_RTG  keypair
          #   rac-rtg                     -> RAC_RTG   keypair
          if variation == "si-rtg" and install_type.upper() == "JFS2":
              inputs["ibmcloud_api_key"] = os.environ["TF_VAR_IBMCLOUD_API_KEY"] # pragma: allowlist secret
              inputs["ssh_public_key"]   = os.environ["TF_VAR_SSH_PUBLIC_KEY_JFS2_RTG"] # pragma: allowlist secret
              inputs["ssh_private_key"]  = os.environ["TF_VAR_SSH_PRIVATE_KEY_JFS2_RTG"] # pragma: allowlist secret
          elif variation == "si-rtg" and install_type.upper() == "ASM":
              inputs["ibmcloud_api_key"] = os.environ["TF_VAR_IBMCLOUD_API_KEY"] # pragma: allowlist secret
              inputs["ssh_public_key"]   = os.environ["TF_VAR_SSH_PUBLIC_KEY_ASM_RTG"] # pragma: allowlist secret
              inputs["ssh_private_key"]  = os.environ["TF_VAR_SSH_PRIVATE_KEY_ASM_RTG"] # pragma: allowlist secret
          elif variation == "rac-rtg":
              inputs["ibmcloud_api_key"] = os.environ["TF_VAR_IBMCLOUD_API_KEY"] # pragma: allowlist secret
              inputs["ssh_public_key"]   = os.environ["TF_VAR_SSH_PUBLIC_KEY_RAC_RTG"] # pragma: allowlist secret
              inputs["ssh_private_key"]  = os.environ["TF_VAR_SSH_PRIVATE_KEY_RAC_RTG"] # pragma: allowlist secret
          elif dtype == "private":
              inputs["ibmcloud_api_key"] = os.environ["TF_VAR_IBMCLOUD_API_KEY_PRIVATE"] # pragma: allowlist secret
              inputs["ssh_private_key"]  = os.environ["TF_VAR_SSH_PRIVATE_KEY_PRIVATE"] # pragma: allowlist secret
          else:
              inputs["ibmcloud_api_key"] = os.environ["TF_VAR_IBMCLOUD_API_KEY"] # pragma: allowlist secret
              inputs["ssh_private_key"]  = os.environ["TF_VAR_SSH_PRIVATE_KEY"] # pragma: allowlist secret
          inputs["ora_db_password"]                  = os.environ["TF_VAR_ORA_DB_PASSWORD"]  # pragma: allowlist secret
          inputs["ibmcloud_cos_service_credentials"] = os.environ["TF_VAR_IBMCLOUD_COS_SERVICE_CREDENTIALS"]  # pragma: allowlist secret
          if variation in ("rac", "rac-rtg"):
              inputs["root_password"]                = os.environ["TF_VAR_ROOT_PASSWORD"]  # pragma: allowlist secret

          with open("/tmp/ibm_inputs.json", "w") as out:
              json.dump({"definition": {"inputs": inputs}}, out, indent=2)

          print(f"OK: {len(inputs)} keys loaded from {inputs_file}")
          print(f"   deployment_type:      {dtype if variation not in ('si-rtg', 'rac-rtg') else 'N/A (RTG)'}")
          print(f"   oracle_install_type:  {install_type if variation == 'si' else 'N/A'}")
          print(f"   prefix:               {prefix if prefix else 'N/A (from inputs.json)'}")
          PYEOF
        env:
          TF_VAR_IBMCLOUD_API_KEY:                 ${{ secrets.TF_VAR_IBMCLOUD_API_KEY }}
          TF_VAR_SSH_PRIVATE_KEY:                  ${{ secrets.TF_VAR_SSH_PRIVATE_KEY }}
          TF_VAR_ORA_DB_PASSWORD:                  ${{ secrets.TF_VAR_ORA_DB_PASSWORD }}
          TF_VAR_ROOT_PASSWORD:                    ${{ secrets.TF_VAR_ROOT_PASSWORD }}
          TF_VAR_IBMCLOUD_COS_SERVICE_CREDENTIALS: ${{ secrets.TF_VAR_IBMCLOUD_COS_SERVICE_CREDENTIALS }}
          TF_VAR_IBMCLOUD_API_KEY_PRIVATE:         ${{ secrets.TF_VAR_IBMCLOUD_API_KEY_PRIVATE }}
          TF_VAR_SSH_PRIVATE_KEY_PRIVATE:          ${{ secrets.TF_VAR_SSH_PRIVATE_KEY_PRIVATE }}
          TF_VAR_SSH_PUBLIC_KEY_JFS2_RTG:          ${{ secrets.TF_VAR_SSH_PUBLIC_KEY_JFS2_RTG }}
          TF_VAR_SSH_PRIVATE_KEY_JFS2_RTG:         ${{ secrets.TF_VAR_SSH_PRIVATE_KEY_JFS2_RTG }}
          TF_VAR_SSH_PUBLIC_KEY_ASM_RTG:           ${{ secrets.TF_VAR_SSH_PUBLIC_KEY_ASM_RTG }}
          TF_VAR_SSH_PRIVATE_KEY_ASM_RTG:          ${{ secrets.TF_VAR_SSH_PRIVATE_KEY_ASM_RTG }}
          TF_VAR_SSH_PUBLIC_KEY_RAC_RTG:           ${{ secrets.TF_VAR_SSH_PUBLIC_KEY_RAC_RTG }}
          TF_VAR_SSH_PRIVATE_KEY_RAC_RTG:          ${{ secrets.TF_VAR_SSH_PRIVATE_KEY_RAC_RTG }}

      # -----------------------------------------------------------------------
      # PATCH project config with full inputs
      # -----------------------------------------------------------------------
      - name: Update Config Inputs
        run: |
          CONFIG_ID="${{ steps.set-ids.outputs.config_id }}"
          PROJECT_ID="${{ steps.set-ids.outputs.project_id }}"

          RESPONSE=$(curl -s -w "\n%{http_code}" -X PATCH \
            "${IBM_API_URL}/projects/${PROJECT_ID}/configs/${CONFIG_ID}" \
            -H "Authorization: Bearer ${IAM_TOKEN}" \
            -H "Content-Type: application/json" \
            -d @/tmp/ibm_inputs.json)

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "HTTP: ${HTTP_CODE}"

          if [[ "${HTTP_CODE}" != "200" ]]; then
            echo "Update failed:"
            echo "${BODY}" | python3 -m json.tool 2>/dev/null || echo "${BODY}"
            exit 1
          fi
          echo "Config inputs updated"

      # -----------------------------------------------------------------------
      # Trigger validation with retry + exponential backoff
      # -----------------------------------------------------------------------
      - name: Trigger Validation
        run: |
          CONFIG_ID="${{ steps.set-ids.outputs.config_id }}"
          PROJECT_ID="${{ steps.set-ids.outputs.project_id }}"
          MAX_RETRIES=5
          RETRY_DELAY=30

          for i in $(seq 1 $MAX_RETRIES); do
            RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
              "${IBM_API_URL}/projects/${PROJECT_ID}/configs/${CONFIG_ID}/validate" \
              -H "Authorization: Bearer ${IAM_TOKEN}" \
              -H "Content-Type: application/json" \
              -d '{}')
            HTTP_CODE=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | head -1)
            echo "Attempt ${i}: HTTP ${HTTP_CODE}"

            if [[ "${HTTP_CODE}" == "200" || "${HTTP_CODE}" == "202" ]]; then
              echo "Validation triggered"
              exit 0
            elif [[ "${HTTP_CODE}" == "500" || "${HTTP_CODE}" == "429" ]]; then
              echo "Transient error - retrying in ${RETRY_DELAY}s..."
              sleep $RETRY_DELAY
              RETRY_DELAY=$((RETRY_DELAY * 2))
            else
              echo "Trigger validation failed:"
              echo "${BODY}" | python3 -m json.tool 2>/dev/null || echo "${BODY}"
              exit 1
            fi
          done

          echo "Validation trigger failed after ${MAX_RETRIES} attempts"
          exit 1

      # -----------------------------------------------------------------------
      # Poll validation every 30s - max 15 min
      # -----------------------------------------------------------------------
      - name: Poll Validation Status
        run: |
          CONFIG_ID="${{ steps.set-ids.outputs.config_id }}"
          PROJECT_ID="${{ steps.set-ids.outputs.project_id }}"
          MAX_WAIT=900
          INTERVAL=30
          ELAPSED=0
          TOKEN_AGE=0
          TOKEN_REFRESH_INTERVAL=900

          echo "Polling validation status (max 15 min)..."

          while [ $ELAPSED -lt $MAX_WAIT ]; do
            # Refresh IAM token every 45 minutes
            if [ $TOKEN_AGE -ge $TOKEN_REFRESH_INTERVAL ]; then
              echo "Refreshing IAM token..."
              NEW_TOKEN=$(ibmcloud iam oauth-tokens | grep "IAM token" | awk '{print $4}')
              if [ -n "${NEW_TOKEN}" ]; then
                IAM_TOKEN=${NEW_TOKEN}
                TOKEN_AGE=0
                echo "IAM token refreshed"
              else
                echo "Warning: token refresh failed, continuing with existing token"
              fi
            fi

            RESPONSE=$(curl -s \
              "${IBM_API_URL}/projects/${PROJECT_ID}/configs/${CONFIG_ID}" \
              -H "Authorization: Bearer ${IAM_TOKEN}")
            STATE=$(echo "$RESPONSE" | python3 -c \
              'import json,sys; d=json.load(sys.stdin); print(d.get("state","unknown"))')
            echo "[${ELAPSED}s] State: ${STATE}"

            if [[ "${STATE}" == "validated" ]]; then
              echo "Validation passed"
              {
                echo "## Validation Complete"
                echo ""
                echo "| Field | Value |"
                echo "|-------|-------|"
                echo "| Variation | ${{ github.event.inputs.variation }} |"
                echo "| Deployment Type | ${{ github.event.inputs.deployment_type }} |"
                echo "| Install Type | ${{ github.event.inputs.install_type }} |"
                echo "| Triggered by | ${{ github.actor }} |"
                echo "| Status | Validated |"
              } >> "$GITHUB_STEP_SUMMARY"
              exit 0
            elif [[ "${STATE}" == "validating_failed" ]]; then
              echo "Validation failed:"
              echo "$RESPONSE" | python3 -c '
          import json, sys
          d = json.load(sys.stdin)
          for item in d.get("needs_attention_state", []):
              print(item)
          '
              echo "## Validation Failed" >> "$GITHUB_STEP_SUMMARY"
              exit 1
            fi

            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
            TOKEN_AGE=$((TOKEN_AGE + INTERVAL))
          done

          echo "Validation timed out after ${MAX_WAIT}s"
          exit 1

  ##############################################################################
  # JOB 2 - Deploy (approval gate + validate must pass)
  ##############################################################################
  deploy:
    name: Deploy (${{ github.event.inputs.variation }}-${{ github.event.inputs.deployment_type }})
    runs-on: ubuntu-latest
    needs: validate
    environment: production
    if: github.event.inputs.action == 'validate-and-deploy'

    steps:
      - name: Login and Get IAM Token
        run: |
          curl -fsSL https://clis.cloud.ibm.com/install/linux | sh -s -- -q
          ibmcloud login --apikey "${{ secrets.IC_API_KEY }}" --no-region -q
          ibmcloud target -r us-south -q
          TOKEN=$(ibmcloud iam oauth-tokens | grep "IAM token" | awk '{print $4}')
          echo "IAM_TOKEN=${TOKEN}" >> $GITHUB_ENV
          echo "IC_API_KEY_VAL=${{ secrets.IC_API_KEY }}" >> $GITHUB_ENV
          echo "IAM token obtained"

      - name: Approve Config
        run: |
          CONFIG_ID="${{ needs.validate.outputs.config_id }}"
          PROJECT_ID="${{ needs.validate.outputs.project_id }}"

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "${IBM_API_URL}/projects/${PROJECT_ID}/configs/${CONFIG_ID}/approve" \
            -H "Authorization: Bearer ${IAM_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"comment\": \"Approved via CD pipeline by ${{ github.actor }}\"}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          if [[ "${HTTP_CODE}" != "200" && "${HTTP_CODE}" != "202" ]]; then
            echo "Approval failed (HTTP ${HTTP_CODE}):"
            echo "$RESPONSE" | head -1 | python3 -m json.tool 2>/dev/null
            exit 1
          fi
          echo "Config approved by ${{ github.actor }}"

      - name: Trigger Deploy
        run: |
          CONFIG_ID="${{ needs.validate.outputs.config_id }}"
          PROJECT_ID="${{ needs.validate.outputs.project_id }}"
          MAX_RETRIES=5
          RETRY_DELAY=30

          for i in $(seq 1 $MAX_RETRIES); do
            RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
              "${IBM_API_URL}/projects/${PROJECT_ID}/configs/${CONFIG_ID}/deploy" \
              -H "Authorization: Bearer ${IAM_TOKEN}" \
              -H "Content-Type: application/json" \
              -d '{}')
            HTTP_CODE=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | head -1)
            echo "Attempt ${i}: HTTP ${HTTP_CODE}"

            if [[ "${HTTP_CODE}" == "200" || "${HTTP_CODE}" == "202" ]]; then
              echo "Deploy triggered"
              exit 0
            elif [[ "${HTTP_CODE}" == "409" ]]; then
              echo "Already deploying - skipping trigger, polling status"
              exit 0
            elif [[ "${HTTP_CODE}" == "500" || "${HTTP_CODE}" == "429" ]]; then
              echo "Transient error - retrying in ${RETRY_DELAY}s..."
              sleep $RETRY_DELAY
              RETRY_DELAY=$((RETRY_DELAY * 2))
            else
              echo "Deploy trigger failed:"
              echo "${BODY}" | python3 -m json.tool 2>/dev/null || echo "${BODY}"
              exit 1
            fi
          done

          echo "Deploy trigger failed after ${MAX_RETRIES} attempts"
          exit 1

      - name: Poll Deploy Status
        run: |
          CONFIG_ID="${{ needs.validate.outputs.config_id }}"
          PROJECT_ID="${{ needs.validate.outputs.project_id }}"
          VARIATION="${{ github.event.inputs.variation }}"
          if [ "${VARIATION}" == "si" ]; then
            MAX_WAIT=10800      # SI standard: 3 hrs
          elif [ "${VARIATION}" == "si-rtg" ]; then
            MAX_WAIT=14400      # SI RTG (includes landing zone): 4 hrs
          elif [ "${VARIATION}" == "rac-rtg" ]; then
            MAX_WAIT=28800      # RAC RTG (includes landing zone): 8 hrs
          else
            MAX_WAIT=21600      # RAC standard: 6 hrs
          fi
          INTERVAL=60
          ELAPSED=0
          TOKEN_AGE=0
          TOKEN_REFRESH_INTERVAL=900
          DEPLOY_START=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          echo "Polling deploy (SI max 3hrs / RAC max 6hrs)..."
          echo "Deploy start time: ${DEPLOY_START}"
          echo "Token refresh every 45 minutes"

          while [ $ELAPSED -lt $MAX_WAIT ]; do

            # Refresh IAM token every 45 minutes
            if [ $TOKEN_AGE -ge $TOKEN_REFRESH_INTERVAL ]; then
              echo "[${ELAPSED}s] Refreshing IAM token..."
              NEW_TOKEN=$(ibmcloud iam oauth-tokens | grep "IAM token" | awk '{print $4}')
              if [ -n "${NEW_TOKEN}" ]; then
                IAM_TOKEN=${NEW_TOKEN}
                TOKEN_AGE=0
                echo "[${ELAPSED}s] IAM token refreshed successfully"
              else
                echo "[${ELAPSED}s] Warning: token refresh failed, re-login..."
                ibmcloud login --apikey "${IC_API_KEY_VAL}" --no-region -q
                ibmcloud target -r us-south -q
                IAM_TOKEN=$(ibmcloud iam oauth-tokens | grep "IAM token" | awk '{print $4}')
                TOKEN_AGE=0
                echo "[${ELAPSED}s] IAM token re-obtained"
              fi
            fi

            # Fetch IBM Projects state and workspace ID
            IBM_RESPONSE=$(curl -s \
              "${IBM_API_URL}/projects/${PROJECT_ID}/configs/${CONFIG_ID}" \
              -H "Authorization: Bearer ${IAM_TOKEN}")

            IBM_STATE=$(echo "$IBM_RESPONSE" | python3 -c '
          import json, sys
          d = json.load(sys.stdin)
          state = d.get("state", "unknown")
          if state == "unknown":
              result = d.get("last_deployed", {}).get("result", "")
              if result == "succeeded":
                  print("deployed")
                  sys.exit(0)
          print(state)
          ')

            WORKSPACE_ID=$(echo "$IBM_RESPONSE" | python3 -c \
              'import json,sys; d=json.load(sys.stdin); print(d.get("schematics",{}).get("workspace_id",""))')

            echo "workspace: ${WORKSPACE_ID}"

            # IBM Projects deployed = definitive success
            if [[ "${IBM_STATE}" == "deployed" ]]; then
              echo "[${ELAPSED}s] IBM Projects: ${IBM_STATE} | Schematics: skipped (IBM Projects confirmed deployed)"
              echo "Deployment successful"
              {
                echo "## Deployment Complete"
                echo ""
                echo "| Field | Value |"
                echo "|-------|-------|"
                echo "| Variation | ${{ github.event.inputs.variation }} |"
                echo "| Deployment Type | ${{ github.event.inputs.deployment_type }} |"
                echo "| Install Type | ${{ github.event.inputs.install_type }} |"
                echo "| Triggered by | ${{ github.actor }} |"
                echo "| Status | Deployed |"
              } >> "$GITHUB_STEP_SUMMARY"
              exit 0
            fi

            if [[ "${IBM_STATE}" == "deploying_failed" ]]; then
              echo "[${ELAPSED}s] Deployment failed"
              echo "## Deployment Failed" >> "$GITHUB_STEP_SUMMARY"
              exit 1
            fi

            # Check Schematics only when workspace ID is available
            WS_RESULT="pending"
            if [ -n "${WORKSPACE_ID}" ]; then
              WS_RESULT=$(curl -s \
                "https://us-south.schematics.cloud.ibm.com/v1/workspaces/${WORKSPACE_ID}/actions?limit=10" \
                -H "Authorization: Bearer ${IAM_TOKEN}" | python3 -c '
          import json, sys
          from datetime import datetime, timezone

          deploy_start = datetime.fromisoformat("'"${DEPLOY_START}"'".replace("Z", "+00:00"))
          d = json.load(sys.stdin)
          for a in d.get("actions", []):
              name = a.get("name", "")
              template = a.get("templates", [{}])[0]
              status = template.get("status", "")
              added = template.get("log_summary", {}).get("resources_added", 0)
              start_time = template.get("start_time", "")
              if not start_time:
                  continue
              action_time = datetime.fromisoformat(start_time.replace("Z", "+00:00"))
              if action_time < deploy_start:
                  continue
              if name == "TERRAFORM_COMMANDS" and status == "COMPLETED" and added > 0:
                  print("succeeded")
                  sys.exit(0)
              if name == "TERRAFORM_COMMANDS" and status in ["FAILED", "CANCELLED"]:
                  print("failed")
                  sys.exit(0)
          print("pending")
          ')
            fi

            echo "[${ELAPSED}s] IBM Projects: ${IBM_STATE} | Schematics: ${WS_RESULT}"

            if [[ "${WS_RESULT}" == "succeeded" ]]; then
              echo "Deployment successful"
              {
                echo "## Deployment Complete"
                echo ""
                echo "| Field | Value |"
                echo "|-------|-------|"
                echo "| Variation | ${{ github.event.inputs.variation }} |"
                echo "| Deployment Type | ${{ github.event.inputs.deployment_type }} |"
                echo "| Install Type | ${{ github.event.inputs.install_type }} |"
                echo "| Triggered by | ${{ github.actor }} |"
                echo "| Status | Deployed |"
              } >> "$GITHUB_STEP_SUMMARY"
              exit 0
            elif [[ "${WS_RESULT}" == "failed" ]]; then
              echo "Deployment failed"
              echo "## Deployment Failed" >> "$GITHUB_STEP_SUMMARY"
              exit 1
            fi

            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
            TOKEN_AGE=$((TOKEN_AGE + INTERVAL))
          done

          echo "Deploy timed out after ${MAX_WAIT}s"
          exit 1

  ##############################################################################
  # JOB 3 - Destroy (approval gate, independent of validate/deploy)
  ##############################################################################
  destroy:
    name: Destroy (${{ github.event.inputs.variation }}-${{ github.event.inputs.deployment_type }})
    runs-on: ubuntu-latest
    environment: production
    if: github.event.inputs.action == 'destroy'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login and Get IAM Token
        run: |
          curl -fsSL https://clis.cloud.ibm.com/install/linux | sh -s -- -q
          ibmcloud login --apikey "${{ secrets.IC_API_KEY }}" --no-region -q
          ibmcloud target -r us-south -q
          TOKEN=$(ibmcloud iam oauth-tokens | grep "IAM token" | awk '{print $4}')
          echo "IAM_TOKEN=${TOKEN}" >> $GITHUB_ENV
          echo "IC_API_KEY_VAL=${{ secrets.IC_API_KEY }}" >> $GITHUB_ENV
          echo "IAM token obtained"

      - name: Set Config ID
        id: set-ids
        run: |
          VARIATION="${{ github.event.inputs.variation }}"
          DTYPE="${{ github.event.inputs.deployment_type }}"
          INSTALL_TYPE=$(echo "${{ github.event.inputs.install_type }}" | tr '[:upper:]' '[:lower:]')

          python3 - <<PYEOF
          import json, os, sys

          with open("deploy/config.json") as f:
              config = json.load(f)

          variation    = "${VARIATION}"
          dtype        = "${DTYPE}"
          install_type = "${INSTALL_TYPE}"

          if variation == "si":
              section  = config.get(variation, {}).get(dtype, {}).get(install_type, {})
              key_path = f"{variation}/{dtype}/{install_type}"
          elif variation in ("si-rtg", "rac-rtg"):
              section  = config.get(variation, {}).get(dtype, {})
              key_path = f"{variation}/{dtype}"
          else:
              section  = config.get(variation, {}).get(dtype, {})
              key_path = f"{variation}/{dtype}"

          config_id  = section.get("config_id", "")
          project_id = section.get("project_id", "")

          if not config_id or not project_id:
              print(f"No config found for {key_path} in deploy/config.json")
              sys.exit(1)

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"config_id={config_id}\n")
              f.write(f"project_id={project_id}\n")

          print(f"OK: {key_path} -> config_id: {config_id}")
          PYEOF

      - name: Trigger Undeploy
        run: |
          CONFIG_ID="${{ steps.set-ids.outputs.config_id }}"
          PROJECT_ID="${{ steps.set-ids.outputs.project_id }}"
          MAX_RETRIES=5
          RETRY_DELAY=30

          for i in $(seq 1 $MAX_RETRIES); do
            RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
              "${IBM_API_URL}/projects/${PROJECT_ID}/configs/${CONFIG_ID}/undeploy" \
              -H "Authorization: Bearer ${IAM_TOKEN}" \
              -H "Content-Type: application/json" \
              -d '{}')
            HTTP_CODE=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | head -1)
            echo "Attempt ${i}: HTTP ${HTTP_CODE}"

            if [[ "${HTTP_CODE}" == "200" || "${HTTP_CODE}" == "202" ]]; then
              echo "Undeploy triggered"
              exit 0
            elif [[ "${HTTP_CODE}" == "500" || "${HTTP_CODE}" == "429" ]]; then
              echo "Transient error - retrying in ${RETRY_DELAY}s..."
              sleep $RETRY_DELAY
              RETRY_DELAY=$((RETRY_DELAY * 2))
            else
              echo "Undeploy trigger failed:"
              echo "${BODY}" | python3 -m json.tool 2>/dev/null || echo "${BODY}"
              exit 1
            fi
          done

          echo "Undeploy trigger failed after ${MAX_RETRIES} attempts"
          exit 1

      - name: Poll Destroy Status
        run: |
          CONFIG_ID="${{ steps.set-ids.outputs.config_id }}"
          PROJECT_ID="${{ steps.set-ids.outputs.project_id }}"
          MAX_WAIT=10800
          INTERVAL=60
          ELAPSED=0
          TOKEN_AGE=0
          TOKEN_REFRESH_INTERVAL=900

          echo "Polling destroy status (max 3 hours)..."
          echo "Token refresh every 45 minutes"

          while [ $ELAPSED -lt $MAX_WAIT ]; do

            # Refresh IAM token every 45 minutes
            if [ $TOKEN_AGE -ge $TOKEN_REFRESH_INTERVAL ]; then
              echo "[${ELAPSED}s] Refreshing IAM token..."
              NEW_TOKEN=$(ibmcloud iam oauth-tokens | grep "IAM token" | awk '{print $4}')
              if [ -n "${NEW_TOKEN}" ]; then
                IAM_TOKEN=${NEW_TOKEN}
                TOKEN_AGE=0
                echo "[${ELAPSED}s] IAM token refreshed successfully"
              else
                echo "[${ELAPSED}s] Warning: token refresh failed, re-login..."
                ibmcloud login --apikey "${IC_API_KEY_VAL}" --no-region -q
                ibmcloud target -r us-south -q
                IAM_TOKEN=$(ibmcloud iam oauth-tokens | grep "IAM token" | awk '{print $4}')
                TOKEN_AGE=0
                echo "[${ELAPSED}s] IAM token re-obtained"
              fi
            fi

            # Fetch IBM Projects state and workspace ID
            IBM_RESPONSE=$(curl -s \
              "${IBM_API_URL}/projects/${PROJECT_ID}/configs/${CONFIG_ID}" \
              -H "Authorization: Bearer ${IAM_TOKEN}")

            IBM_STATE=$(echo "$IBM_RESPONSE" | python3 -c \
              'import json,sys; d=json.load(sys.stdin); print(d.get("state","unknown"))')

            WORKSPACE_ID=$(echo "$IBM_RESPONSE" | python3 -c \
              'import json,sys; d=json.load(sys.stdin); print(d.get("schematics",{}).get("workspace_id",""))')

            echo "workspace: ${WORKSPACE_ID}"

            if [[ "${IBM_STATE}" == "undeploying_failed" ]]; then
              echo "Destroy failed"
              echo "## Destroy Failed" >> "$GITHUB_STEP_SUMMARY"
              exit 1
            fi

            # Check Schematics last action as source of truth
            WS_RESULT="pending"
            if [ -n "${WORKSPACE_ID}" ]; then
              WS_RESULT=$(curl -s \
                "https://us-south.schematics.cloud.ibm.com/v1/workspaces/${WORKSPACE_ID}/actions?limit=1" \
                -H "Authorization: Bearer ${IAM_TOKEN}" | python3 -c '
          import json, sys
          d = json.load(sys.stdin)
          actions = d.get("actions", [])
          if not actions:
              print("pending")
              sys.exit(0)
          a = actions[0]
          name = a.get("name", "")
          template = a.get("templates", [{}])[0]
          status = template.get("status", "")
          destroyed = template.get("log_summary", {}).get("resources_destroyed", 0)
          if name == "DESTROY" and status == "COMPLETED" and destroyed > 0:
              print("succeeded")
          elif name == "DESTROY" and status in ["FAILED", "CANCELLED"]:
              print("failed")
          else:
              print("pending")
          ')
            fi

            echo "[${ELAPSED}s] IBM Projects: ${IBM_STATE} | Schematics: ${WS_RESULT}"

            if [[ "${WS_RESULT}" == "succeeded" ]]; then
              echo "Resources destroyed successfully"
              {
                echo "## Destroy Complete"
                echo ""
                echo "| Field | Value |"
                echo "|-------|-------|"
                echo "| Variation | ${{ github.event.inputs.variation }} |"
                echo "| Deployment Type | ${{ github.event.inputs.deployment_type }} |"
                echo "| Install Type | ${{ github.event.inputs.install_type }} |"
                echo "| Triggered by | ${{ github.actor }} |"
                echo "| Status | Destroyed |"
              } >> "$GITHUB_STEP_SUMMARY"
              exit 0
            elif [[ "${WS_RESULT}" == "failed" ]]; then
              echo "Destroy failed"
              echo "## Destroy Failed" >> "$GITHUB_STEP_SUMMARY"
              exit 1
            fi

            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
            TOKEN_AGE=$((TOKEN_AGE + INTERVAL))
          done

          echo "Destroy timed out after ${MAX_WAIT}s"
          exit 1
