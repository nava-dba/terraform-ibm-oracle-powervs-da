name: CI-Pipeline

on:
  issue_comment:
    types: [created]
  workflow_dispatch:

jobs:

  pre-commit:
    name: Pre-Commit Checks
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.issue.pull_request != null &&
        contains(github.event.comment.body, '/run pipeline')
      )
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.event.issue.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name || github.event.issue.pull_request.head.repo.full_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Install TFLint
        run: |
          curl -s https://raw.githubusercontent.com/terraform-linters/tflint/master/install_linux.sh | bash
          tflint --version

      - name: Install terraform-docs
        run: |
          curl -sSLo terraform-docs.tar.gz \
            https://terraform-docs.io/dl/v0.18.0/terraform-docs-v0.18.0-linux-amd64.tar.gz
          tar -xzf terraform-docs.tar.gz
          chmod +x terraform-docs
          sudo mv terraform-docs /usr/local/bin/
          terraform-docs --version

      - name: Install detect-secrets
        run: pip install detect-secrets==1.4.0

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit
        run: pre-commit run --all-files --show-diff-on-failure

      - name: Run TFLint
        run: tflint --recursive --minimum-failure-severity=error

  terraform-validate:
    name: Terraform Validate
    needs: pre-commit
    if: needs.pre-commit.result == 'success'
    runs-on: ubuntu-latest

    strategy:
      matrix:
        terraform_dir:
          - "modules/ansible"
          - "solutions/oracle/si"
          - "solutions/oracle/rac"
      fail-fast: false

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.event.issue.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name || github.event.issue.pull_request.head.repo.full_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
          submodules: recursive

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Terraform Init
        working-directory: ${{ matrix.terraform_dir }}
        run: terraform init -backend=false -input=false
        env:
          TF_VAR_ibmcloud_api_key: ${{ secrets.TF_VAR_IBMCLOUD_API_KEY }}

      - name: Terraform Format Check
        working-directory: ${{ matrix.terraform_dir }}
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        working-directory: ${{ matrix.terraform_dir }}
        run: terraform validate
        env:
          TF_VAR_ibmcloud_api_key: ${{ secrets.TF_VAR_IBMCLOUD_API_KEY }}

  tfsec:
    name: TFSec Security Scan
    needs: terraform-validate
    if: needs.terraform-validate.result == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.event.issue.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name || github.event.issue.pull_request.head.repo.full_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
          submodules: recursive

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          soft_fail: true
          github_token: ${{ secrets.GITHUB_TOKEN }}
